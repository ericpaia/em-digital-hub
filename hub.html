<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EM Digital Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --accent:#22E07C; --bg:#0A0C0A; --card:#111411; --card2:#151915; --border:rgba(255,255,255,0.07); --ink:#F4F6F3; --dim:#A8B0AA; --glow:rgba(34,224,124,0.09); }
  [data-mode="hub"] { --accent:#FF7A29; --bg:#0C0A09; --card:#151110; --card2:#181310; --dim:#B3ACA5; --glow:rgba(255,122,41,0.10); }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:'Montserrat',sans-serif; font-size:13px; -webkit-font-smoothing:antialiased; transition:background .3s; }
  a { color:var(--accent); text-decoration:none; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:99px; }
  ::-webkit-scrollbar-track { background:transparent; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:6px; }
  .num { font-variant-numeric:tabular-nums; }
  .mono { font-family:ui-monospace,'SF Mono',monospace; }

  .glow { position:fixed; inset:0; pointer-events:none; background:radial-gradient(720px 460px at 88% -6%, var(--glow), transparent 70%); z-index:0; }
  .app { position:relative; z-index:1; display:flex; min-height:100vh; }

  /* sidebar */
  .side { width:214px; flex:0 0 214px; background:var(--card2); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 0 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .brand { padding:0 18px 18px; font-weight:700; font-size:20px; letter-spacing:-.01em; display:flex; align-items:center; gap:10px; }
  .brand .pc { width:30px; height:30px; border-radius:99px; background:var(--accent); color:#0A0C0A; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; flex:none; }
  .brand small { font-size:10px; color:var(--dim); font-weight:500; }
  .whoami { margin:0 18px 14px; padding:10px 12px; background:var(--card); border:1px solid var(--border); border-radius:14px; display:flex; align-items:center; gap:10px; cursor:pointer; }
  .whoami .av { width:26px; height:26px; border-radius:99px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--dim); flex:none; }
  .whoami b { font-size:11px; font-weight:600; display:block; }
  .whoami s { font-size:9px; color:var(--dim); text-decoration:none; display:block; }
  .live { margin:0 18px 16px; display:flex; align-items:center; gap:7px; font-size:10px; color:var(--dim); }
  .live .d { width:6px; height:6px; border-radius:99px; background:var(--accent); flex:none; }
  .navwrap { flex:1; overflow-y:auto; }
  .navgroup .gt { padding:8px 18px 6px; font-size:9px; letter-spacing:.2em; color:var(--dim); font-weight:600; }
  .navgroup { padding:8px 0 4px; }
  .navitem { padding:8px 18px 8px 16px; cursor:pointer; font-size:12.5px; border-left:2px solid transparent; color:var(--dim); font-weight:500; }
  .navitem:hover { color:var(--ink); }
  .navitem.on { border-left-color:var(--accent); color:var(--accent); font-weight:700; }
  .metacard { margin:14px 18px 0; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; }
  .metacard .l { font-size:9px; letter-spacing:.16em; color:var(--dim); font-weight:600; }
  .metacard .v { margin-top:6px; font-size:12px; font-weight:600; }
  .metacard .bar { margin-top:8px; height:4px; border-radius:99px; background:rgba(255,255,255,0.08); }
  .metacard .bar i { display:block; height:4px; border-radius:99px; background:var(--accent); }
  .metacard .s { margin-top:6px; font-size:10px; color:var(--dim); }
  .opby { margin:12px 18px 0; padding-top:12px; border-top:1px solid var(--border); font-size:10px; color:var(--dim); }
  .opby .g { font-weight:700; color:#22E07C; }

  /* main */
  .main { flex:1; min-width:0; display:flex; flex-direction:column; }
  .top { height:58px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; padding:0 26px; position:sticky; top:0; background:var(--bg); z-index:20; }
  .modesw { display:flex; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:3px; gap:2px; }
  .modesw div { padding:6px 16px; border-radius:999px; font-size:11px; font-weight:600; cursor:pointer; color:var(--dim); }
  .modesw div.on { background:var(--accent); color:#0A0C0A; }
  [data-mode="hub"] .modesw div.on.consw { background:transparent; color:var(--dim); }
  .toplabel { font-size:9px; letter-spacing:.18em; font-weight:600; color:var(--dim); }
  .topbadge { padding:5px 14px; border:1px solid var(--accent); border-radius:999px; font-size:9px; letter-spacing:.14em; font-weight:700; color:var(--accent); }
  .content { flex:1; overflow-y:auto; padding:30px 32px 48px; }

  /* primitives */
  .eyebrow { font-size:10px; letter-spacing:.2em; color:var(--accent); font-weight:700; }
  h1 { margin:8px 0 0; font-size:30px; font-weight:800; letter-spacing:-.02em; }
  .divider { width:60px; height:2px; background:var(--accent); margin:14px 0 26px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px; }
  .lbl { font-size:9px; letter-spacing:.18em; color:var(--dim); font-weight:600; }
  .big { margin-top:10px; font-weight:700; font-size:clamp(22px,2.4vw,34px); white-space:nowrap; }
  .sub { margin-top:6px; font-size:11px; color:var(--dim); }
  .grid { display:grid; gap:18px; }
  .kbtn { background:var(--accent); color:#0A0C0A; border-radius:999px; padding:9px 20px; font-size:11px; font-weight:700; cursor:pointer; border:0; display:inline-flex; align-items:center; gap:6px; }
  .obtn { border:1px solid var(--border); color:var(--dim); border-radius:999px; padding:9px 20px; font-size:11px; font-weight:600; cursor:pointer; background:none; }
  .obtn:hover { border-color:var(--accent); color:var(--ink); }
  .pill { padding:7px 16px; border-radius:999px; border:1px solid var(--border); color:var(--dim); font-size:10.5px; font-weight:600; cursor:pointer; background:none; }
  .pill.on { background:var(--accent); color:#0A0C0A; border-color:var(--accent); font-weight:700; }
  .pill:hover:not(.on) { color:var(--ink); }
  .chip { border:1px solid var(--border); border-radius:999px; padding:5px 13px; font-size:10.5px; color:var(--dim); }

  /* toast */
  .toasts { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:100; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }
  .toast { background:var(--card); border:1px solid var(--accent); color:var(--ink); padding:11px 18px; border-radius:999px; font-size:12px; box-shadow:0 8px 30px rgba(0,0,0,.4); }

  /* chart anim */
  @keyframes cdraw { to { stroke-dashoffset:0; } }
  .cline { stroke-dasharray:1 1; stroke-dashoffset:1; animation:cdraw 1.1s ease forwards; }
  @media (prefers-reduced-motion:reduce){ .cline{ animation:none; stroke-dasharray:none; } }

  /* kanban */
  .board { display:flex; gap:14px; overflow-x:auto; padding-bottom:8px; align-items:flex-start; }
  .col { flex:0 0 auto; width:224px; }
  .col .ch { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .col .ch .dt { width:8px; height:8px; border-radius:99px; flex:none; }
  .col .ch b { font-size:12px; font-weight:700; }
  .col .ch .n { margin-left:auto; font-size:10px; color:var(--dim); }
  .dz { min-height:60px; border-radius:12px; transition:background .12s; }
  .dz.drop { background:rgba(255,255,255,0.04); outline:1px dashed var(--accent); }
  .lead { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:9px; cursor:grab; }
  .lead:active { cursor:grabbing; }
  .lead.drag { opacity:.4; }
  .lead .lt { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .lead .av { width:26px; height:26px; border-radius:99px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; flex:none; }
  .lead .nm { font-size:12px; font-weight:700; }
  .lead .cr { font-size:10px; color:var(--dim); }
  .lead .val { font-size:13px; font-weight:800; margin-bottom:8px; }
  .lead .lb { display:flex; align-items:center; }

  /* whatsapp */
  .wabox { display:grid; grid-template-columns:290px 1fr; border:1px solid var(--border); border-radius:18px; overflow:hidden; height:540px; background:var(--card); }
  .walist { border-right:1px solid var(--border); overflow-y:auto; }
  .wc { display:flex; align-items:center; gap:11px; padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
  .wc:hover { background:var(--card2); }
  .wc.on { background:var(--card2); }
  .wc .av { width:36px; height:36px; border-radius:99px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex:none; }
  .wc .tx { min-width:0; flex:1; }
  .wc .tx b { font-size:12px; font-weight:600; display:block; }
  .wc .tx s { font-size:10.5px; color:var(--dim); text-decoration:none; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wc .rt { text-align:right; }
  .wc .rt .t { font-size:9px; color:var(--dim); }
  .wc .rt .b { display:inline-block; margin-top:4px; min-width:16px; height:16px; border-radius:99px; background:#22C55E; color:#04310F; font-size:9px; font-weight:700; line-height:16px; }
  .wthread { display:flex; flex-direction:column; min-width:0; }
  .whead { display:flex; align-items:center; gap:11px; padding:12px 16px; border-bottom:1px solid var(--border); }
  .whead .av { width:34px; height:34px; border-radius:99px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex:none; }
  .wmsgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; background:var(--card2); }
  .wm { max-width:74%; font-size:12px; line-height:1.45; padding:8px 11px; border-radius:10px; }
  .wm.them { background:var(--card); align-self:flex-start; border-bottom-left-radius:3px; }
  .wm.me { background:rgba(34,197,94,0.14); align-self:flex-end; border-bottom-right-radius:3px; }
  .wm .t { font-size:9px; color:var(--dim); margin-top:2px; text-align:right; }
  .wain { display:flex; gap:9px; padding:12px; border-top:1px solid var(--border); }
  .wain input { flex:1; min-width:0; border:1px solid var(--border); border-radius:999px; padding:9px 14px; background:var(--card2); color:var(--ink); font:400 12px 'Montserrat'; }
  .wain input:focus { outline:none; border-color:#22C55E; }
  .wain button { width:36px; height:36px; border-radius:99px; border:0; background:#22C55E; color:#04310F; cursor:pointer; font-size:14px; font-weight:800; flex:none; }

  /* generic table grid */
  .thead, .trow { display:grid; gap:10px; align-items:center; }
  .thead { padding:12px 20px; border-bottom:1px solid var(--border); font-size:9px; letter-spacing:.16em; color:var(--dim); font-weight:600; }
  .trow { padding:14px 20px; border-bottom:1px solid var(--border); font-size:12px; }
  .trow:last-child { border-bottom:0; }
  .cavatar { width:30px; height:30px; border-radius:99px; color:#0A0C0A; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px; flex:none; }

  .fadein { animation:fade .35s ease; }
  @keyframes fade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* login */
  .loginwrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:var(--bg); z-index:200; padding:20px; }
  .loginbox { width:340px; max-width:100%; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:30px 26px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .lin { width:100%; box-sizing:border-box; margin-bottom:12px; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--ink); font:500 13px 'Montserrat'; }
  .lin:focus { outline:none; border-color:var(--accent); }
  /* workspace picker */
  .wspick { margin:0 18px 14px; }
  .wspick label { display:block; font-size:9px; letter-spacing:.16em; color:var(--dim); font-weight:600; margin-bottom:6px; }
  .wspick select { width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:9px 12px; color:var(--ink); font:600 12px 'Montserrat'; cursor:pointer; }
  .wspick select:focus { outline:none; border-color:var(--accent); }
  /* logout */
  .logout { margin:12px 18px 0; padding:9px 12px; text-align:center; font-size:11px; color:var(--dim); border:1px solid var(--border); border-radius:12px; cursor:pointer; }
  .logout:hover { color:var(--ink); border-color:var(--accent); }
</style>
</head>

<script>
const $ = id => document.getElementById(id);
function toast(m){ const t=document.createElement('div'); t.className='toast'; t.textContent=m; $('toasts').appendChild(t); setTimeout(()=>{t.style.opacity=0;t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2200); }

/* ---------- state ---------- */

/* ---------- supabase ---------- */

const SB_KEY = 'sb_publishable_i-H1zzoou38HJmBhBfcanQ_cUVJdqOm';
const sb = window.supabase.createClient(SB_URL, SB_KEY);
let WORKSPACES = [];
function activeWs(){ return WORKSPACES.find(w=>w.id===S.wsId) || null; }
function initials(n){ return (n||'').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
const LEAD_COLORS=['#6366F1','#DB2777','#4F46E5','#2563EB','#16A34A','#EA580C','#D97706','#DC2626','#7C3AED','#0891B2','#059669','#9333EA'];
function leadColor(s){ let h=0; for(const ch of (s||'?')) h=(h*31+ch.charCodeAt(0))>>>0; return LEAD_COLORS[h%LEAD_COLORS.length]; }
function timeAgo(iso){ if(!iso) return ''; const d=(Date.now()-new Date(iso).getTime())/1000; if(d<3600) return Math.max(1,Math.floor(d/60))+' min'; if(d<86400) return Math.floor(d/3600)+' h'; return Math.floor(d/86400)+' d'; }
function mapLead(r){ return {id:r.id, n:r.name, car:r.interest||'', v:Number(r.value)||0, src:r.source||'', stage:r.stage||0, c:leadColor(r.name), t:timeAgo(r.created_at)}; }

/* ---------- shell ---------- */
function renderShell(){
  const me=meLabel(), ws=activeWs();
  const navHtml=`<div class="navwrap">${NAV[S.mode].map(g=>`<div class="navgroup"><div class="gt">${g.t}</div>${g.items.map(([id,l])=>`<div class="navitem ${S.screen===id?'on':''}" data-nav="${id}">${l}</div>`).join('')}</div>`).join('')}</div>`;

  } else {
    const name=ws?ws.name:'Cliente', ini=ws?initials(ws.name):'--', L=LABELS.hub;
    $('side').innerHTML =
      `<div class="brand"><span class="pc">${ini}</span><span>${name}</span></div>`
      + `<div class="whoami"><span class="av">${me.ini}</span><span><b>${me.b}</b><s>operando o hub</s></span></div>`
      + `<div class="live"><span class="d"></span> Operacional, sem alertas</div>`

function wireDnd(){ let dragId=null; const b=$('board'); if(!b)return;
  b.querySelectorAll('.lead').forEach(el=>{ el.addEventListener('dragstart',()=>{dragId=el.dataset.id;el.classList.add('drag');}); el.addEventListener('dragend',()=>{el.classList.remove('drag');b.querySelectorAll('.dz').forEach(z=>z.classList.remove('drop'));}); });
  b.querySelectorAll('.dz').forEach(z=>{ z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drop');}); z.addEventListener('dragleave',()=>z.classList.remove('drop')); z.addEventListener('drop',e=>{e.preventDefault();const l=LEADS.find(x=>x.id===dragId);if(l){const to=+z.dataset.stage;if(l.stage!==to){const from=l.stage;l.stage=to;$('crmPanel').innerHTML=crmFunil();wireDnd();toast(l.n+' → '+CRM_STAGES[to][0]);sb.from('leads').update({stage:to}).eq('id',l.id).then(({error})=>{if(error){l.stage=from;toast('Falha ao salvar, revertido');if(S.screen==='hcrm'&&S.crm==='funil'){$('crmPanel').innerHTML=crmFunil();wireDnd();}}});}}}); });

}

  const nl=e.target.closest('[data-newlead]'); if(nl){ newLead(); return; }
  const lo=e.target.closest('[data-logout]'); if(lo){ logout(); return; }
  const oh=e.target.closest('[data-openhub]'); if(oh){ S.wsId=oh.dataset.openhub; localStorage.setItem('emhub_ws',S.wsId); (async()=>{ await loadWorkspaceLeads(S.wsId); S.mode='hub'; S.screen='h1'; render(); })(); return; }
  const igo=e.target.closest('[data-igopen]'); if(igo){ window.open(igo.dataset.igopen,'_blank','noopener'); return; }
  const igp=e.target.closest('[data-igprofile]'); if(igp){ const ws=activeWs(); if(ws&&ws.instagram){ window.open('https://instagram.com/'+ws.instagram,'_blank','noopener'); } else { S.ig='perfil'; renderScreen(); } return; }
  const ihs=e.target.closest('[data-ighandle-save]'); if(ihs){ const i=$('igHandle'); saveIgHandle(i&&i.value); return; }
  const ihe=e.target.closest('[data-ighandle-edit]'); if(ihe){ const ws=activeWs(); saveIgHandle(prompt('@ do Instagram:', (ws&&ws.instagram)||'')); return; }
  const fc=e.target.closest('[data-fchip]'); if(fc){ fc.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('on')); fc.classList.add('on'); return; }
  const tg=e.target.closest('[data-tgl]'); if(tg){ const on=!tg.classList.contains('on'); tg.classList.toggle('on'); tg.style.background=on?'var(--accent)':'rgba(255,255,255,0.12)'; tg.innerHTML=`<span style="position:absolute; top:2px; ${on?'right:2px':'left:2px'}; width:16px; height:16px; border-radius:99px; background:${on?'#0A0C0A':'#F4F6F3'}"></span>`; return; }
  const t=e.target.closest('[data-toast]'); if(t){ toast(t.dataset.toast); return; }
  const igs=e.target.closest('#igSend'); if(igs){ const i=$('igInput'); if(i&&i.value.trim()){ toast('Claude está gerando o ajuste'); i.value=''; } return; }
});

/* ---------- supabase-driven shell helpers ---------- */
function modeSwitch(){ const ws=activeWs(); const hn=ws?ws.name.split(' ')[0]:'Cliente';
  return `<div class="modesw"><div class="consw ${S.mode==='console'?'on':''}" data-mode="console">Console EM Digital</div><div class="${S.mode==='hub'?'on':''}" data-mode="hub">Hub: ${hn}</div></div>`; }
function wsPicker(){ if(!WORKSPACES.length) return '';
  return `<div class="wspick"><label>PRÉVIA DO HUB</label><select id="wsPick">${WORKSPACES.map(w=>`<option value="${w.id}" ${w.id===S.wsId?'selected':''}>${w.name}</option>`).join('')}</select></div>`; }

/* ---------- data loading ---------- */
async function loadWorkspaceLeads(wsId){
  if(!wsId){ LEADS=[]; return; }
  const { data, error } = await sb.from('leads').select('*').eq('workspace_id',wsId).order('created_at',{ascending:true});
  if(error){ toast('Erro ao carregar leads'); LEADS=[]; return; }
  LEADS = (data||[]).map(mapLead);
}
async function loadData(){
  const { data:{ user } } = await sb.auth.getUser(); S.user=user;
  const { data:ws, error } = await sb.from('workspaces').select('*');
  if(error){ toast('Erro ao carregar workspaces'); WORKSPACES=[]; }
  else WORKSPACES = (ws||[]).slice().sort((a,b)=> ((a.kind==='agency'?-1:0)-(b.kind==='agency'?-1:0)) || a.name.localeCompare(b.name));
  const agency=WORKSPACES.find(w=>w.kind==='agency');
  S.wsId = agency ? agency.id : (WORKSPACES[0] && WORKSPACES[0].id) || null;
  if(S.wsId) localStorage.setItem('emhub_ws', S.wsId);
  await loadWorkspaceLeads(S.wsId);
}

/* ---------- CRM write ---------- */
async function newLead(){
  const ws=activeWs(); if(!ws){ toast('Selecione um workspace'); return; }
  const n=prompt('Nome do lead:'); if(!n) return;
  const interest=prompt('Interesse (produto ou serviço):')||'';
  const raw=prompt('Valor potencial (R$):')||'0';
  const value=parseFloat(raw.replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'))||0;
  const { data, error } = await sb.from('leads').insert({ workspace_id:ws.id, name:n.trim(), interest:interest.trim(), value, source:'Manual', stage:0 }).select().single();
  if(error){ toast('Erro ao salvar lead'); return; }
  LEADS.unshift(mapLead(data));
  if(S.screen==='hcrm') renderScreen();
  toast(n.trim()+' entrou no funil');
}
async function saveIgHandle(raw){
  if(raw==null) return;
  const ws=activeWs(); if(!ws){ toast('Selecione um workspace'); return; }
  const h=String(raw).trim().replace(/^https?:\/\/(www\.)?instagram\.com\//i,'').replace(/^@+/,'').replace(/\s+/g,'').replace(/\/.*$/,'');
  if(!h){ toast('Informe um @ válido'); return; }
  const { error } = await sb.from('workspaces').update({ instagram:h }).eq('id',ws.id);
  if(error){ toast('Não foi possível salvar (sem permissão?)'); return; }
  ws.instagram=h;
  if(S.screen==='h3') renderScreen();
  toast('Instagram conectado: @'+h);
}

/* ---------- auth ---------- */
function traduzErro(m){ m=m||''; if(/Invalid login/i.test(m)) return 'E-mail ou senha incorretos.'; if(/Email not confirmed/i.test(m)) return 'E-mail ainda não confirmado no Supabase.'; if(/Failed to fetch|NetworkError|network/i.test(m)) return 'Sem conexão com o Supabase (rode via servidor local, veja abaixo).'; return m; }
function showLogin(msg){
  document.body.dataset.mode='console'; document.body.style.removeProperty('--accent');
  const app=document.querySelector('.app'); if(app) app.style.display='none';
  let ov=$('login'); if(!ov){ ov=document.createElement('div'); ov.id='login'; ov.className='loginwrap'; document.body.appendChild(ov); }
  ov.style.display='flex';
  ov.innerHTML=`<form class="loginbox" id="loginForm">
    <div class="brand" style="justify-content:center; padding:0 0 6px"><span style="color:var(--accent)">EM</span>&nbsp;<span>Digital</span></div>
    <div style="text-align:center; font-size:11px; color:var(--dim); margin-bottom:20px">Entre para acessar o hub</div>
    <input class="lin" id="liEmail" type="email" placeholder="E-mail" autocomplete="username" value="ericminellio@gmail.com">
    <input class="lin" id="liPass" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="kbtn" style="width:100%; justify-content:center; padding:12px" type="submit">Entrar</button>
    <div id="liMsg" style="margin-top:12px; font-size:11px; color:var(--dim); text-align:center; min-height:14px">${msg||''}</div>
  </form>`;
  $('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const email=$('liEmail').value.trim(), password=$('liPass').value;
    const m=$('liMsg'); m.style.color='var(--dim)'; m.textContent='Entrando...';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ m.style.color='#E5484D'; m.textContent=traduzErro(error.message); return; }
    ov.style.display='none'; if(app) app.style.display='';
    await loadData(); render();
  });
  setTimeout(()=>{ const p=$('liPass'); if(p) p.focus(); },50);
}
async function logout(){ try{ await sb.auth.signOut(); }catch(e){} WORKSPACES=[]; LEADS=[]; S.wsId=null; S.user=null; S.mode='console'; S.screen='c1'; showLogin('Sessão encerrada.'); }

/* ---------- boot ---------- */
document.addEventListener('change', async e=>{
  const wp=e.target.closest('#wsPick'); if(wp){ S.wsId=wp.value; localStorage.setItem('emhub_ws', S.wsId); await loadWorkspaceLeads(S.wsId); render(); }
});
async function boot(){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ showLogin(); return; }
    await loadData(); render();
  }catch(err){ showLogin(traduzErro(err&&err.message)); }
}
boot();
</script>
</body>
</html>
